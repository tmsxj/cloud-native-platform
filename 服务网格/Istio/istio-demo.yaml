# Istio 演示应用（与 Linkerd 演示应用同构，便于双网格对比）
# 命名空间开启自动注入：istio-injection=enabled
apiVersion: v1
kind: Namespace
metadata:
  name: istio-demo
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-backend
  namespace: istio-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-backend
  template:
    metadata:
      labels:
        app: nginx-backend
    spec:
      containers:
      - name: nginx
        image: 192.168.1.61/library/nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-backend
  namespace: istio-demo
spec:
  selector:
    app: nginx-backend
  ports:
  - name: http
    port: 80
    targetPort: 80
---
# client：持续向 nginx-backend 发请求，制造 L7 流量用于观测
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: istio-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
      - name: client
        image: 192.168.1.61/library/busybox:1.28
        command: ["/bin/sh", "-c"]
        args:
        - >
          while true; do
            wget -q -O- http://nginx-backend/ >/dev/null 2>&1;
            sleep 1;
          done
