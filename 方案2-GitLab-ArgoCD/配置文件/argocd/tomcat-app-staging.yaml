# =============================================================================
# ArgoCD Application: tomcat-app-staging (STAGING 环境)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tomcat-app-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    namespace: tomcat-staging
    server: https://kubernetes.default.svc
  source:
    repoURL: http://gitlab.gitlab.svc.cluster.local/root/tomcat-app.git
    targetRevision: main
    path: k8s/overlays/staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
