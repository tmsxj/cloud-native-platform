# ============================================================================
# 示例: 明文 Secret 模板 (用 kubeseal 加密后生成 SealedSecret)
# 
# ⚠️ 这个文件是模板，不要直接提交 Git！
#    Controller 部署后执行: kubeseal < example-secret.yaml > sealed-harbor-registry.yaml
#    然后把 sealed-harbor-registry.yaml 提交 Git，ArgoCD 会同步它
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: harbor-registry
  namespace: tomcat-dev
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "192.168.1.61": {
          "username": "admin",
          "password": "Harbor12345",
          "auth": "YWRtaW46SGFyYm9yMTIzNDU="
        }
      }
    }
