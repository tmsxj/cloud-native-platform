# ============================================================================
# ArgoCD Git 仓库注册 Secret
# ============================================================================
# 功能: 将 Git 仓库注册到 ArgoCD，使 ArgoCD 可以从中读取 K8s 部署清单
# 原理: ArgoCD 通过 label "argocd.argoproj.io/secret-type: repository"
#        来识别 Secret 为仓库凭证（即使 git:// 不需要密码也要注册）
#
# 两种注册方式:
#   方式1（YAML，推荐）: kubectl apply -f repo-secret.yaml  → GitOps 化管理
#   方式2（CLI）:       argocd repo add git://...            → 快速测试
#
# 使用前注意:
#   - 确保仓库 URL 中的 Git Server 服务名与实际一致
#   - 本文档 Git Server 地址: git://git-server.git.svc.cluster.local:9418
#   - 如果 Git Server 在不同命名空间，调整 URL 中的服务名
# ============================================================================

---
# ---- 仓库 1: snownlp-observability-demo (业务应用) ----
apiVersion: v1
kind: Secret
metadata:
  name: repo-snownlp           # ← ArgoCD 仓库名称（唯一标识）
  namespace: argocd
  labels:
    # ★关键 Label★: ArgoCD 通过这个 Label 识别为 Git 仓库配置
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git                    # ← 仓库类型: git
  # Git Server 地址，使用 git:// 协议 + 9418 端口
  # DNS 解析: git-server.git.svc.cluster.local → Service ClusterIP
  url: git://git-server.git.svc.cluster.local:9418/snownlp-observability-demo.git

---
# ---- 仓库 2: monitoring-config (监控基础设施配置) ----
apiVersion: v1
kind: Secret
metadata:
  name: repo-monitoring        # ← ArgoCD 仓库名称（唯一标识）
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: git://git-server.git.svc.cluster.local:9418/monitoring-config.git
