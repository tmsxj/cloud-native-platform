apiVersion: v1
kind: Pod
metadata:
  name: add-jaeger-ds
  namespace: monitoring
spec:
  restartPolicy: Never
  containers:
  - name: c
    image: 192.168.1.61/library/alpine_curl
    command: ["sh", "-c"]
    args:
    - |
      echo "=== try type=jaeger ==="
      curl -s -u admin:admin -X POST http://grafana.monitoring:80/api/datasources \
        -H "Content-Type: application/json" \
        -d '{"name":"Jaeger","type":"jaeger","access":"proxy","url":"http://jaeger.monitoring:16686","editable":false,"isDefault":false}'
      echo
      echo "=== existing datasources ==="
      curl -s -u admin:admin http://grafana.monitoring:80/api/datasources
      echo
