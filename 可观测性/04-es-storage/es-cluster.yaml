# ============================================================
# P2b.12 — ES 3 节点集群 StatefulSet
# 部署命令: kubectl apply -f es-cluster.yaml
# 前置条件: monitoring 命名空间存在
#            worker 宿主机 vm.max_map_count >= 262144
# 验证日期: 2026-07-06 ✅
# ============================================================
---
# 1. Headless Service — 集群节点发现
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: monitoring
  labels:
    app: elasticsearch
spec:
  clusterIP: None
  publishNotReadyAddresses: true   # 关键: 未 Ready 也注册 DNS
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300

---
# 2. StatefulSet — 3 节点集群
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: monitoring
spec:
  podManagementPolicy: Parallel     # 并行启动, 加速集群组建
  replicas: 3
  serviceName: elasticsearch-headless
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: 192.168.1.61/library/docker.elastic.co_elasticsearch_elasticsearch:8.11.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          env:
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name   # elasticsearch-0/-1/-2
            - name: cluster.name
              value: "k8s-monitoring"
            - name: cluster.initial_master_nodes
              value: "elasticsearch-0,elasticsearch-1,elasticsearch-2"
            - name: discovery.seed_hosts
              value: "elasticsearch-headless.monitoring.svc.cluster.local"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: xpack.security.enabled
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
              scheme: HTTP
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /_cluster/health?wait_for_status=yellow&timeout=5s
              port: 9200
              scheme: HTTP
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /usr/share/elasticsearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app: elasticsearch
      spec:
        storageClassName: local-path
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
