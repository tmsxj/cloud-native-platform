# ============================================================================
# Prometheus 告警规则文件
# ============================================================================
# 规则总数: 15 条
# 规则分组: 6 组 (node / pod / deployment / statefulset / pvc / prometheus / watchdog)
# 严重级别: critical (需立即处理) / warning (需关注) / none (心跳检测)
#
# 告警规则覆盖范围:
#   节点: CPU使用率(80%/95%) / 内存(85%/95%) / 磁盘空间 / 磁盘使用率 / 文件系统只读
#   Pod: CrashLoopBackOff / NotReady / 长时间Pending
#   Deployment: 副本数不匹配
#   StatefulSet: 副本数不匹配
#   PVC: 存储空间低于15%
#   Prometheus: Target下线 / 未摄入新样本
#   Watchdog: 告警管道心跳 (始终触发，验证整条通知链路正常)
# ============================================================================

groups:
  # =========================================================================
  # 分组 1: 节点告警 (node-exporter 指标)
  # 数据来源: kubelet cAdvisor + node-exporter
  # 指标前缀: node_cpu_, node_memory_, node_filesystem_
  # =========================================================================
  - name: node-alerts
    rules:
      # 节点 CPU 使用率 > 80% (warning)
      # 计算方式: 100 - idle时间百分比 = CPU 使用率
      - alert: NodeCPUHigh
        expr: |
          (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m   # 持续 5 分钟才触发，避免瞬时峰值误报
        labels:
          severity: warning
        annotations:
          summary: "节点 {{ $labels.instance }} CPU 使用率过高"
          description: "节点 {{ $labels.instance }} CPU 使用率超过 80%，当前值: {{ $value | humanize }}%"

      # 节点 CPU 使用率 > 95% (critical)
      # 计算方式: 同 NodeCPUHigh，阈值提高到 95%
      - alert: NodeCPUCritical
        expr: |
          (100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "节点 {{ $labels.instance }} CPU 使用率严重过高"
          description: "节点 {{ $labels.instance }} CPU 使用率超过 95%，当前值: {{ $value | humanize }}%"

      # 节点内存使用率 > 85%
      # 计算方式: (总内存 - 可用内存) / 总内存 × 100
      - alert: NodeMemoryHigh
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "节点 {{ $labels.instance }} 内存使用率过高"
          description: "节点 {{ $labels.instance }} 内存使用率超过 85%，当前值: {{ $value | humanize }}%"

      # 节点内存使用率 > 95%
      - alert: NodeMemoryCritical
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "节点 {{ $labels.instance }} 内存使用率严重过高"
          description: "节点 {{ $labels.instance }} 内存使用率超过 95%，当前值: {{ $value | humanize }}%"

      # 磁盘空间预测耗尽 (< 24小时)
      # 计算方式: predict_linear 线性预测 24 小时后的磁盘剩余空间
      - alert: NodeDiskPressure
        expr: |
          predict_linear(node_filesystem_free_bytes{mountpoint="/"}[1h], 24 * 3600) < 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "节点 {{ $labels.instance }} 磁盘空间即将耗尽"
          description: "节点 {{ $labels.instance }} 根分区预计 24 小时内磁盘空间耗尽，当前可用: {{ $value | humanize }}B"

      # 磁盘使用率 > 85%
      # 计算方式: (总容量 - 可用容量) / 总容量 × 100
      - alert: NodeDiskUsageHigh
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "节点 {{ $labels.instance }} 磁盘使用率过高"
          description: "节点 {{ $labels.instance }} 磁盘使用率超过 85%，当前值: {{ $value | humanize }}%"

      # 文件系统变为只读 (硬件故障/存储异常)
      - alert: NodeFilesystemReadOnly
        expr: |
          node_filesystem_readonly{mountpoint!=""} == 1
        for: 1m   # 只读状态很严重，1 分钟就报警
        labels:
          severity: critical
        annotations:
          summary: "节点 {{ $labels.instance }} 文件系统只读"
          description: "节点 {{ $labels.instance }} 的文件系统 {{ $labels.mountpoint }} 变为只读状态"

  # =========================================================================
  # 分组 2: Pod 告警 (kube-state-metrics 指标)
  # 数据来源: kube-state-metrics (kube_pod_* 系列指标)
  # =========================================================================
  - name: pod-alerts
    rules:
      # Pod 频繁重启 (CrashLoopBackOff)
      # 计算方式: 15 分钟内容器重启次数 > 0
      - alert: KubePodCrashLooping
        expr: |
          rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 频繁重启"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} (容器 {{ $labels.container }}) 在过去 15 分钟内重启了 {{ $value }} 次"

      # Pod 超过 10 分钟未 Running (可能启动失败)
      - alert: KubePodNotReady
        expr: |
          sum by(namespace, pod) (kube_pod_status_phase{phase!="Running"}) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 未就绪"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 已经超过 10 分钟未处于 Running 状态"

      # Pod 长时间 Pending (可能资源不足或调度失败)
      - alert: KubePodPending
        expr: |
          sum by(namespace, pod) (kube_pod_status_phase{phase="Pending"}) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 长时间 Pending"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} 已经 Pending 超过 15 分钟，可能是调度失败或资源不足"

  # =========================================================================
  # 分组 3: Deployment 告警
  # =========================================================================
  - name: deployment-alerts
    rules:
      # Deployment 期望副本数 ≠ 可用副本数
      # 常见原因: 镜像拉取失败 / 资源不足 / 健康检查未通过
      - alert: KubeDeploymentReplicasMismatch
        expr: |
          kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} 副本数不匹配"
          description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} 期望 {{ $labels.kube_deployment_spec_replicas }} 个副本，但只有 {{ $value }} 个可用"

  # =========================================================================
  # 分组 4: StatefulSet 告警
  # =========================================================================
  - name: statefulset-alerts
    rules:
      # StatefulSet 就绪副本数 ≠ 期望副本数
      # 常见原因: PVC 绑定失败 / Pod 启动顺序问题 / 网络分区
      - alert: KubeStatefulSetReplicasMismatch
        expr: |
          kube_statefulset_status_replicas_ready != kube_statefulset_status_replicas
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} 副本异常"
          description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} 期望的副本数与就绪数不一致"

  # =========================================================================
  # 分组 5: PVC 存储告警
  # =========================================================================
  - name: pvc-alerts
    rules:
      # PVC 可用空间 < 15%
      # 计算方式: 可用容量 / 总容量 < 0.15
      - alert: KubePersistentVolumeFillingUp
        expr: |
          (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} 空间不足"
          description: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} 可用空间低于 15%，当前可用: {{ $value | humanizePercentage }}"

  # =========================================================================
  # 分组 6: Prometheus 自身监控
  # =========================================================================
  - name: prometheus-alerts
    rules:
      # 采集目标下线 (up == 0 表示无法 scrape)
      - alert: TargetDown
        expr: |
          up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "监控目标 {{ $labels.job }}/{{ $labels.instance }} 下线"
          description: "Prometheus 无法从 {{ $labels.job }} 的 {{ $labels.instance }} 抓取指标，已经持续 5 分钟"

      # Prometheus 自身停止摄入数据 (可能磁盘满/TSDB损坏)
      - alert: PrometheusNotIngestingSamples
        expr: |
          rate(prometheus_tsdb_head_samples_appended_total[5m]) <= 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus 未摄入新样本"
          description: "Prometheus 在过去 5 分钟内没有摄入新的指标样本，可能是采集配置有问题"

  # =========================================================================
  # 分组 7: 告警管道心跳 (Watchdog)
  # =========================================================================
  # 功能: 始终触发的告警规则，用于验证 AlertManager → 通知渠道的整条链路
  # 面试重点: 这是 Prometheus 官方推荐的告警管道健康检查方案
  - name: watchdog
    rules:
      - alert: Watchdog
        expr: vector(1)       # 始终返回 1，确保持久触发
        labels:
          severity: none
        annotations:
          summary: "告警管道心跳检测"
          description: "这是一个始终触发的告警，用于验证 AlertManager → 通知 的整条链路是否正常工作，可以安全忽略"
