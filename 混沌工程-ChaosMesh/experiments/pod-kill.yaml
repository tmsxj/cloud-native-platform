# PodChaos — 随机删除目标 Pod，验证重建与可用性
# 改 metadata.namespace + spec.selector 匹配你正在运行的目标 Deployment
#
# 运行: kubectl apply -f pod-kill.yaml
# 停止: kubectl delete -f pod-kill.yaml
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-demo
  namespace: default          # ← 改成目标 Pod 所在命名空间
spec:
  action: pod-kill
  mode: one                   # one=每次删 1 个；all=全删；fixed-percent=按比例
  value: ""
  duration: "30s"             # 实验持续 30s 后自动停止
  selector:
    labelSelectors:
      app: tomcat-demo        # ← 改成目标 Pod 的 label（如 otel-demo-app）
