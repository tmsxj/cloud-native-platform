# ============================================================
# P2a.15 — Gateway API + Envoy Gateway 金丝雀演示
# 部署命令: kubectl apply -f gateway-demo.yaml
# 前置条件: Gateway API CRDs + Envoy Gateway 已安装
# 验证日期: 2026-07-06 ✅
# ============================================================
---
# 1. Gateway — 定义入口监听
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: default
spec:
  gatewayClassName: eg         # 绑定到 Envoy Gateway GatewayClass
  listeners:
    - name: http
      port: 80
      protocol: HTTP

---
# 2. Demo Services — v1 和 v2
apiVersion: v1
kind: Service
metadata:
  name: demo-v1
  namespace: default
spec:
  selector:
    app: demo
    version: v1
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: demo-v2
  namespace: default
spec:
  selector:
    app: demo
    version: v2
  ports:
    - port: 80
      targetPort: 80

---
# 3. HTTPRoute — 80/20 金丝雀流量分割
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-canary
  namespace: default
spec:
  parentRefs:
    - name: eg                    # 挂载到上面的 Gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: demo-v1
          port: 80
          weight: 80              # v1 80%
        - name: demo-v2
          port: 80
          weight: 20              # v2 20%
